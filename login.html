<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Landesgericht – Mitarbeiter-Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/auth.js"></script>
</head>
<body class="bg-gericht">
<header class="top-header">
    <div class="logo-title">
        <img src="Landesgericht_adler" alt="Logo Landesgericht" class="logo">
        <div>
            <h1>Landesgericht</h1>
            <p>Mitarbeiterbereich</p>
        </div>
    </div>
    <nav class="main-nav">
        <a href="index.html" class="nav-link">Amtliche Ankündigungen</a>
        <a href="gesetzesänderungen.html" class="nav-link">Gesetzesänderungen</a>
        <a href="login.html" class="nav-link active">Mitarbeiterbereich</a>
    </nav>
</header>

<main class="content" style="max-width: 480px;">
    <section class="card form-card">
        <h2>Mitarbeiter-Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Benutzername</label>
                <input id="username" type="text" required>
            </div>
            <div class="form-group">
                <label for="password">Passwort</label>
                <input id="password" type="password" required>
            </div>
            <button type="submit" class="btn primary-btn">Anmelden</button>
            <p id="loginError" class="error-text"></p>
            <p class="hint-text">
                Demo: Benutzername <strong>mitarbeiter</strong>, Passwort <strong>gericht2025</strong>
            </p>
        </form>
    </section>
</main>

<footer class="footer">
    <p>Landesgericht – Interner Bereich</p>
</footer>
</body>
</html>
