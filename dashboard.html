<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Landesgericht – Mitarbeiter-Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/auth.js"></script>
</head>
<body class="bg-gericht">
<header class="top-header">
    <div class="logo-title">
        <img src="Landesgericht_adler" alt="Logo Landesgericht" class="logo">
        <div>
            <h1>Landesgericht</h1>
            <p>Mitarbeiter-Dashboard</p>
        </div>
    </div>
    <nav class="main-nav">
        <a href="index.html" class="nav-link">Amtliche Ankündigungen</a>
        <a href="gesetzesänderungen.html" class="nav-link">Gesetzesänderungen</a>
        <a href="dashboard.html" class="nav-link active">Dashboard</a>
        <button id="logoutBtn" class="btn" style="margin-left: 10px;">Abmelden</button>
    </nav>
</header>

<main class="content">
    <section class="card form-card">
        <h2>Neue amtliche Ankündigung</h2>
        <form id="ankuendigungForm">
            <div class="form-group">
                <label for="ankTitel">Titel</label>
                <input id="ankTitel" type="text" required>
            </div>
            <div class="form-group">
                <label for="ankText">Text</label>
                <textarea id="ankText" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label for="ankKategorie">Kategorie</label>
                <select id="ankKategorie" required>
                    <option value="">Bitte wählen</option>
                    <option value="Rot">Rot</option>
                    <option value="Gelb">Gelb</option>
                    <option value="Grün">Grün</option>
                </select>
            </div>
            <button type="submit" class="btn primary-btn">Ankündigung speichern</button>
            <p id="ankSuccess" class="success-text"></p>
        </form>
    </section>

    <section class="card form-card">
        <h2>Gesetzesänderung eintragen</h2>

        <div class="form-group">
            <label>Art der Gesetzesänderung</label>
            <div class="radio-group">
                <label><input type="radio" name="gesetzArt" value="neu" checked> Neues Gesetzbuch</label>
                <label><input type="radio" name="gesetzArt" value="vorhanden"> Vorhandenes Gesetzbuch</label>
            </div>
        </div>

        <form id="gesetzNeuForm" class="gesetz-form">
            <div class="form-group">
                <label for="neuName">Wie heißt das Gesetzbuch?</label>
                <input id="neuName" type="text" required>
            </div>
            <div class="form-group">
                <label for="neuAbk">Abkürzung</label>
                <input id="neuAbk" type="text" required>
            </div>
            <div class="form-group">
                <label for="neuLink">Google-Docs-Link zum Gesetzbuch</label>
                <input id="neuLink" type="url" required>
            </div>
            <div class="form-group">
                <label for="neuDatum">In-Kraft-Tretung (Datum)</label>
                <input id="neuDatum" type="date" required>
            </div>
            <button type="submit" class="btn primary-btn">Neues Gesetzbuch speichern</button>
            <p id="neuSuccess" class="success-text"></p>
        </form>

        <form id="gesetzVorhForm" class="gesetz-form hidden">
            <div class="form-group">
                <label for="vorhBuch">Welches Gesetzbuch ist betroffen?</label>
                <input id="vorhBuch" type="text" required>
            </div>
            <div class="form-group">
                <label for="vorhParagraph">Welcher Paragraph?</label>
                <input id="vorhParagraph" type="text" required>
            </div>
            <div class="form-group">
                <label for="vorhNotiz">Notiz (mindestens 10 Zeichen)</label>
                <textarea id="vorhNotiz" rows="3" minlength="10" required></textarea>
            </div>
            <div class="form-group">
                <label for="vorhDatum">In-Kraft-Tretung (Datum)</label>
                <input id="vorhDatum" type="date" required>
            </div>
            <button type="submit" class="btn primary-btn">Gesetzesänderung speichern</button>
            <p id="vorhSuccess" class="success-text"></p>
        </form>
    </section>
</main>

<footer class="footer">
    <p>Landesgericht – Interner Bereich</p>
</footer>
</body>
</html>
